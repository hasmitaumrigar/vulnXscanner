{% extends "base.html" %}

{% block title %}Subdomain Finder | VulnX{% endblock %}

{% block content %}
<div class="header">
    <h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; margin-right: 8px; vertical-align: -5px;">
            <circle cx="11" cy="11" r="8"></circle>
            <path d="m21 21-4.35-4.35"></path>
        </svg>
        Subdomain Finder
    </h1>
    <p>Discover valid subdomains associated with any hostname</p>
</div>

<div class="search-container">
    <form>
        <div class="input-group">
            <input type="text" name="domain" placeholder="example.com" required>
            <button type="submit" id="subdomainBtn" class="btn-primary">
                Find Subdomains
            </button>
        </div>
        
        <div class="deep-scan-container">
            <label class="deep-scan-toggle">
                <input type="checkbox" name="deep_scan" id="deepScanCheck">
                <span class="toggle-slider"></span>
                <span class="toggle-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: inline-block; margin-right: 6px; vertical-align: -2px;">
                        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                    </svg>
                    Deep Scan Mode
                </span>
            </label>
            <p class="deep-scan-hint">Enable for DNS brute-force with 50k+ wordlist, permutations & recursive scanning</p>
        </div>
    </form>
</div>

<div id="progressContainer" class="progress-container" style="display: none;">
    <div class="progress-info">
        <span id="progressText">Scanning...</span>
        <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
        <div id="progressFill" class="progress-fill" style="width: 0%"></div>
    </div>
    <p id="progressMessage" class="progress-message"></p>
</div>

<div class="terminal" id="terminal">
</div>

<div id="resultsContainer">
</div>


<style>
    .deep-scan-container {
        margin-top: 24px;
        padding: 16px;
        background: rgba(16, 185, 129, 0.05);
        border: 1px solid rgba(16, 185, 129, 0.2);
        border-radius: 12px;
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
    }

    .deep-scan-toggle {
        display: flex;
        align-items: center;
        gap: 12px;
        cursor: pointer;
        user-select: none;
    }

    .deep-scan-toggle input[type="checkbox"] {
        display: none;
    }

    .toggle-slider {
        position: relative;
        width: 50px;
        height: 28px;
        background: rgba(16, 185, 129, 0.2);
        border: 1px solid rgba(16, 185, 129, 0.3);
        border-radius: 14px;
        transition: all 0.3s ease;
    }

    .toggle-slider::before {
        content: '';
        position: absolute;
        width: 24px;
        height: 24px;
        background: var(--accent);
        border-radius: 50%;
        top: 1px;
        left: 1px;
        transition: all 0.3s ease;
        box-shadow: 0 2px 8px rgba(16, 185, 129, 0.2);
    }

    .deep-scan-toggle input[type="checkbox"]:checked ~ .toggle-slider {
        background: var(--accent);
        border-color: var(--accent);
    }

    .deep-scan-toggle input[type="checkbox"]:checked ~ .toggle-slider::before {
        transform: translateX(22px);
        background: #ffffff;
    }

    .toggle-label {
        color: var(--text-primary);
        font-weight: 500;
        transition: color 0.3s ease;
    }

    .deep-scan-toggle:hover .toggle-label {
        color: var(--accent);
    }

    .deep-scan-hint {
        color: var(--text-secondary);
        font-size: 0.85rem;
        margin: 0;
        flex-basis: 100%;
    }

    .progress-container {
        background: rgba(1, 4, 9, 0.95);
        backdrop-filter: blur(10px);
        padding: 24px;
        border-radius: 16px;
        border: 1px solid rgba(16, 185, 129, 0.3);
        margin-top: 24px;
        font-family: 'JetBrains Mono', monospace;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .progress-info {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        color: var(--accent);
        font-size: 0.95rem;
    }

    .progress-bar {
        width: 100%;
        height: 8px;
        background: rgba(16, 185, 129, 0.1);
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        border-radius: 4px;
        transition: width 0.3s ease;
        box-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
    }

    .progress-message {
        margin-top: 12px;
        color: var(--text-secondary);
        font-size: 0.9rem;
        text-align: center;
    }

    .result-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 16px;
        padding-bottom: 12px;
        border-bottom: 1px solid rgba(16, 185, 129, 0.2);
    }

    .result-header h3 {
        color: var(--accent);
        margin: 0;
        font-size: 1.1rem;
    }

    .export-btn {
        background: rgba(16, 185, 129, 0.1);
        border: 1px solid rgba(16, 185, 129, 0.3);
        color: var(--accent);
        padding: 8px 16px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 0.9rem;
        transition: all 0.3s ease;
    }

    .export-btn:hover {
        background: rgba(16, 185, 129, 0.2);
        transform: translateY(-2px);
    }

    .result-list {
        display: flex;
        flex-direction: column;
        gap: 0;
    }

    .result-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        border-bottom: 1px solid rgba(16, 185, 129, 0.1);
        transition: all 0.3s ease;
    }

    .result-item:last-child {
        border-bottom: none;
    }

    .result-item:hover {
        transform: translateX(4px);
        background: rgba(16, 185, 129, 0.05);
        padding: 12px 8px;
    }

    .result-subdomain {
        flex: 1;
        color: var(--accent);
        font-weight: 500;
        word-break: break-all;
    }

    .result-status {
        display: flex;
        gap: 8px;
        align-items: center;
        margin-left: 16px;
    }

    .status-code {
        background: rgba(16, 185, 129, 0.15);
        border: 1px solid rgba(16, 185, 129, 0.3);
        padding: 4px 8px;
        border-radius: 4px;
        color: var(--accent);
        font-weight: bold;
        font-size: 0.85rem;
    }

    .status-text {
        font-size: 0.85rem;
        font-weight: 500;
        padding: 4px 8px;
        border-radius: 4px;
    }

    .status-text.live {
        background: rgba(34, 197, 94, 0.15);
        color: #22c55e;
    }

    .status-text.redirected {
        background: rgba(245, 158, 11, 0.15);
        color: #f59e0b;
    }

    .status-text.restricted {
        background: rgba(239, 68, 68, 0.15);
        color: #ef4444;
    }

    .status-text.unreachable {
        background: rgba(107, 114, 128, 0.15);
        color: #9ca3af;
    }

    .status-text.found {
        background: rgba(16, 185, 129, 0.15);
        color: var(--accent);
    }

    .terminal {
        background: rgba(1, 4, 9, 0.95);
        backdrop-filter: blur(10px);
        padding: 20px;
        border-radius: 16px;
        border: 1px solid rgba(16, 185, 129, 0.3);
        margin-top: 24px;
        margin-bottom: 24px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.9rem;
        line-height: 1.6;
        color: var(--accent);
        max-height: 400px;
        overflow-y: auto;
        box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(16, 185, 129, 0.1),
            0 0 40px rgba(16, 185, 129, 0.1);
    }

    .terminal div {
        word-break: break-word;
        margin-bottom: 4px;
    }

    .result-box {
        background: rgba(1, 4, 9, 0.95);
        backdrop-filter: blur(10px);
        padding: 24px;
        border-radius: 16px;
        border: 1px solid rgba(16, 185, 129, 0.3);
        margin-top: 32px;
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.95rem;
        line-height: 1.8;
        box-shadow: 
            0 8px 32px rgba(0, 0, 0, 0.3),
            inset 0 1px 0 rgba(16, 185, 129, 0.1),
            0 0 40px rgba(16, 185, 129, 0.1);
        animation: fadeIn 0.6s ease-out;
    }

    .message-box {
        color: var(--text-secondary);
        text-align: center;
    }
</style>

<script src="{{ url_for('static', filename='js/subdomain.js') }}"></script>
{% endblock %}
